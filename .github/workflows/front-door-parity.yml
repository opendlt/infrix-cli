# Front-door parity (ADOPTION-03 Phase 5).
#
# Lives in the PUBLIC repo opendlt/infrix-cli. Runs the DOCUMENTED first
# commands on clean runners so the front door can never silently break again.
# Scheduled daily + on every release.
name: front-door-parity

on:
  schedule:
    - cron: "17 6 * * *"
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  installer:
    name: install + version + doctor (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install via the documented one-liner (unix)
        if: runner.os != 'Windows'
        run: sh ./install.sh
      - name: Install via the documented one-liner (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./install.ps1
      - name: infrix version + doctor (offline, fail-closed)
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:/usr/local/bin:$PATH"
          infrix version
          # Pass-19 audit P1-2: no more `|| true` bypass. `doctor --offline` skips
          # the live-node/L0 reachability checks a clean runner cannot satisfy, so a
          # non-zero exit here means a REAL install break (missing binary, missing
          # compiled-in command, bad bundled config) — the job now fails closed.
          infrix doctor --offline

  npx-wrapper:
    name: npx @infrix/cli (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: npx launcher downloads + runs the pinned binary
        run: npx --yes @infrix/cli version

  zero-install-verify:
    name: zero-install @infrix/verify still passes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: verify a real proof offline
        run: |
          mkdir t && cd t && npm init -y >/dev/null && npm install @infrix/verify >/dev/null
          cat > v.mjs <<'EOF'
          import { verifyPortablePackage } from '@infrix/verify';
          import { createRequire } from 'node:module';
          const proof = createRequire(import.meta.url)('@infrix/verify/portable-fixture.valid.json');
          const r = await verifyPortablePackage(proof);
          if (!r.passed) { console.error('FAILED'); process.exit(1); }
          console.log('offline verify passed:', r.checks.length, 'checks');
          EOF
          node v.mjs

  sandbox-intent:
    name: sandbox intent -> verifiable proof (${{ matrix.os }})
    # Pass-18 audit P2-5: prove the most important end-to-end developer path — a
    # governed intent that produces a proof you can verify WITHOUT trusting the
    # node. `infrix demo start --mode local` runs a DETERMINISTIC, fully-offline
    # governed escrow flow (no live node needed), exports a portable proof, and
    # self-verifies it; `infrix demo verify` re-verifies it independently. Every
    # step fails the job on a non-zero exit, so the front door fails closed if the
    # intent -> proof -> independent-verify path ever breaks.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: run a deterministic governed intent and export a proof
        run: npx --yes @infrix/cli demo start --mode local --no-browser
      - name: independently verify the exported proof (no node trust)
        run: npx --yes @infrix/cli demo verify
      - name: print the proof receipt
        run: npx --yes @infrix/cli demo receipt
      - name: stop the backgrounded demo server
        if: always()
        run: npx --yes @infrix/cli demo stop || true
